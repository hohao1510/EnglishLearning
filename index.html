<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuzu English - Siêu Tốc Với Groq</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-cyan-100 min-h-screen p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-indigo-600 mb-2">Zuzu English x Groq ⚡</h1>
            <p class="text-gray-600 italic">"Học tiếng Anh siêu tốc - Miễn phí & Không lỗi Quota"</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-6 rounded-3xl shadow-2xl">
                    <textarea id="inputText" class="w-full p-4 border-2 border-indigo-100 rounded-2xl focus:border-indigo-400 outline-none text-lg transition-all" rows="4" placeholder="Nhập câu tiếng Anh bạn muốn học..."></textarea>
                    <button id="btnLearn" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95 flex justify-center items-center gap-3">
                        <span>Học Ngay (Tốc độ ánh sáng) 🚀</span>
                        <div id="loader" class="hidden w-5 h-5 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
                    </button>
                </div>

                <div id="resultCard" class="hidden glass p-8 rounded-3xl shadow-xl border-l-8 border-indigo-500">
                    <h3 class="text-2xl font-bold text-indigo-700 mb-4">Bài giảng từ Llama 3:</h3>
                    <div id="aiOutput" class="text-gray-800 leading-relaxed text-lg prose prose-indigo"></div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-3xl shadow-xl border-t-4 border-indigo-400">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">📚 Sổ tay Zuzu</h3>
                    <div id="vocabList" class="space-y-3 max-h-[500px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. Firebase Config (Giữ nguyên của bạn)
        const firebaseConfig = {
            apiKey: "AIzaSyD8lW_yTKeqVY-fiOh4ey6H-BexpEC8_Nc",
            authDomain: "planning-with-ai-b14d7.firebaseapp.com",
            projectId: "planning-with-ai-b14d7",
            storageBucket: "planning-with-ai-b14d7.firebasestorage.app",
            messagingSenderId: "334413069266",
            appId: "1:334413069266:web:05b432c606bf1d34d4660b"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
    

        // 2. Groq Config
        const GROQ_KEY = "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";

        const btnLearn = document.getElementById('btnLearn');
        const inputText = document.getElementById('inputText');
        const aiOutput = document.getElementById('aiOutput');
        const resultCard = document.getElementById('resultCard');
        const loader = document.getElementById('loader');
        const vocabList = document.getElementById('vocabList');

        async function callGroq(userText) {
            const prompt = `Bạn là chuyên gia dạy tiếng Anh. Dịch câu này sang tiếng Anh: '${userText}'. Liệt kê 5 từ vựng quan trọng (từ - nghĩa tiếng Việt). Giải thích ngữ pháp ngắn gọn bằng tiếng Việt.`;
            
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${GROQ_KEY}`
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile", // Model cực mạnh và miễn phí
                    messages: [{ role: "user", content: prompt }]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.choices[0].message.content;
        }

        btnLearn.onclick = async () => {
            const text = inputText.value.trim();
            if (!text) return alert("Nhập câu đi Ho Hao!");

            btnLearn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const aiText = await callGroq(text);

                await addDoc(collection(db, "my_vocabulary"), {
                    original: text,
                    translation: aiText,
                    createdAt: serverTimestamp(),
                    provider: "Groq-Llama3"
                });

                aiOutput.innerHTML = aiText.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b class="text-indigo-900">$1</b>');
                resultCard.classList.remove('hidden');
                inputText.value = "";
                loadHistory();
            } catch (e) {
                alert("Lỗi Groq: " + e.message);
            } finally {
                btnLearn.disabled = false;
                loader.classList.add('hidden');
            }
        };

        async function loadHistory() {
            const q = query(collection(db, "my_vocabulary"), orderBy("createdAt", "desc"), limit(10));
            const querySnapshot = await getDocs(q);
            vocabList.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = "p-3 bg-white/60 rounded-xl border border-indigo-100 hover:bg-white transition-all cursor-pointer mb-2 shadow-sm";
                item.innerHTML = `<p class="text-sm font-semibold text-gray-700">📌 ${data.original}</p>`;
                item.onclick = () => {
                    aiOutput.innerHTML = data.translation.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b class="text-indigo-900">$1</b>');
                    resultCard.classList.remove('hidden');
                };
                list.appendChild(item); // Sửa lỗi biến list thành vocabList
                vocabList.appendChild(item);
            });
        }
        loadHistory();
    </script>
</body>
</html>
